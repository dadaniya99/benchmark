name: Build Benchmark Tool

on:
  push:
    branches: [ main ]
    tags: ['v*']
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name benchmark-windows benchmark.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-windows
        path: dist/benchmark-windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name benchmark-macos benchmark.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-macos
        path: dist/benchmark-macos

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --name benchmark-linux benchmark.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-linux
        path: dist/benchmark-linux

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v2.2.1
      with:
        files: |
          artifacts/benchmark-windows/benchmark-windows.exe
          artifacts/benchmark-macos/benchmark-macos
          artifacts/benchmark-linux/benchmark-linux
        tag_name: ${{ github.ref_name }}
        name: Benchmark Tool ${{ github.ref_name }}
        body: |
          See [Changelog](README.md#changelog) for details.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
