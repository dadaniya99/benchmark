name: Build Benchmark Tool

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name benchmark-windows benchmark.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-windows
        path: dist/benchmark-windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name benchmark-macos benchmark.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-macos
        path: dist/benchmark-macos

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --name benchmark-linux benchmark.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-linux
        path: dist/benchmark-linux

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/benchmark-windows/benchmark-windows.exe
          artifacts/benchmark-macos/benchmark-macos
          artifacts/benchmark-linux/benchmark-linux
        tag_name: v${{ github.run_number }}
        name: Benchmark Tool v${{ github.run_number }}
        body: |
          大模型跑分工具
          - Windows: benchmark-windows.exe
          - macOS: benchmark-macos
          - Linux: benchmark-linux
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
