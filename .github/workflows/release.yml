name: Build Multi-Platform Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            ext: .exe
            artifact_name: benchmark.exe
            display_name: Windows
          - os: macos-latest
            name: macos
            ext: ''
            artifact_name: benchmark
            display_name: macOS
          - os: ubuntu-latest
            name: linux
            ext: ''
            artifact_name: benchmark
            display_name: Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller --onefile --windowed --name benchmark benchmark.py

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: pyinstaller --onefile --windowed --name benchmark benchmark.py

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pyinstaller --onefile --name benchmark benchmark.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: benchmark-windows
          path: ./artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: benchmark-macos
          path: ./artifacts/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: benchmark-linux
          path: ./artifacts/linux

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/windows/benchmark.exe release/benchmark-windows.exe
          cp artifacts/macos/benchmark release/benchmark-macos
          cp artifacts/linux/benchmark release/benchmark-linux
          chmod +x release/benchmark-macos release/benchmark-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/benchmark-windows.exe
            release/benchmark-macos
            release/benchmark-linux
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
